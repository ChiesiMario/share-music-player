<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vinyl Disc -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a" />
  <!-- Grooves -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#222" stroke-width="1.5"/>
  
  <!-- Reflection/Glare -->
  <path d="M50 50 L85 15 A 48 48 0 0 0 15 15 Z" fill="rgba(255,255,255,0.05)" />
  <path d="M50 50 L15 85 A 48 48 0 0 0 85 85 Z" fill="rgba(255,255,255,0.05)" />
  
  <!-- Label -->
  <circle cx="50" cy="50" r="16" fill="#ff6b6b" />
  
  <!-- Spindle Hole -->
  <circle cx="50" cy="50" r="3" fill="#e0e0e0" />
  <circle cx="50" cy="50" r="2" fill="#222" />
</svg>
