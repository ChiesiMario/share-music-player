<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="Music Share 音樂分享" />
  <meta property="og:type" content="website" />
  <title>Music Share 音樂分享</title>

  <!-- PWA Manifest and Theme Color -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2b3138" />
  <link rel="apple-touch-icon" href="/vinyl.svg" />

  <link rel="icon" type="image/svg+xml" href="./vinyl.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=72" />
</head>

<body>
  <div class="player-wrapper">
    <!-- Dynamic Blurred Background -->
    <div class="bg-blur-container">
      <div class="bg-blur" id="background"></div>
    </div>

    <!-- Main Player Card -->
    <div class="player-card">

      <div class="top-nav" id="top-nav">
        <button id="home-btn" class="nav-btn" title="回首頁 (輸入新的網址)">
          <i class="fa-solid fa-house"></i>
        </button>
        <button id="share-btn" class="nav-btn" title="複製連結分享">
          <i class="fa-solid fa-share-nodes"></i>
        </button>
      </div>

      <div class="artwork-container">
        <div class="default-cover" id="default-cover" style="display: none;">
          <div class="share-card-modern">
            <div class="eq-bars">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>
            <div class="share-text-modern">
              <span class="share-highlight">Music Share</span>
              <span class="share-label">音 樂 分 享</span>
            </div>
          </div>
        </div>
        <img id="cover" src="" alt="Cover Art" style="display: none;" />

      </div>

      <label class="theme-switch-wrapper" title="切換動態主題色">
        <input type="checkbox" id="theme-switch" class="skeuo-switch-input" checked>
        <div class="skeuo-switch-track">
          <div class="skeuo-switch-thumb"></div>
          <div class="skeuo-switch-led"></div>
        </div>
      </label>

      <div class="track-info">
        <div class="lcd-eq" id="lcd-eq">
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
          <div class="lcd-bar"></div>
        </div>
        <div class="title-wrapper" id="title-wrapper">
          <h1 id="title">&nbsp;</h1>
        </div>
        <div id="fetch-progress-container" class="fetch-progress">
          <div id="fetch-progress-bar"></div>
        </div>

        <div id="url-input-container" class="url-input-container" style="display: none;">
          <div class="tabs-wrapper">
            <button id="tab-url" class="tab-btn active">網路網址</button>
            <button id="tab-local" class="tab-btn">本機上傳</button>
          </div>
          <div id="mode-url" class="input-mode active">
            <div class="input-wrapper">
              <i class="fa-solid fa-link input-icon"></i>
              <input type="text" id="song-url-input" class="url-input" placeholder="輸入音頻網址 (https://...)">
            </div>
          </div>
          <div id="mode-local" class="input-mode">
            <div class="input-wrapper" id="fake-file-input-wrapper" style="cursor: pointer;">
              <i class="fa-solid fa-folder-open input-icon"></i>
              <input type="text" id="fake-file-input" class="url-input" placeholder="點擊選擇音頻檔案以上傳..." readonly
                style="cursor: pointer;">
            </div>
            <div class="input-wrapper" style="margin-top: 8px;">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="upload-password-input" class="url-input" placeholder="請輸入伺服器密碼">
            </div>

            <p
              style="font-size: 10px; color: rgba(84, 200, 250, 0.7); text-align: left; margin-top: 8px; margin-bottom: 0; font-family: 'Inter', sans-serif;">
              <i class="fa-solid fa-circle-info"></i> 上傳的文件會在 36 小時後刪除
            </p>

            <div id="lcd-upload-progress-container" class="retro-loading-container">
              <div class="retro-loading-content">
                <div class="retro-loading-header">
                  <span class="retro-loading-text">Loading</span>
                  <span id="lcd-upload-progress-text" class="retro-loading-pct">0%</span>
                </div>
                <div id="lcd-upload-progress-track" class="retro-loading-track">
                  <div id="lcd-upload-progress-bar" class="retro-loading-bar"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <h2 id="artist"><a id="artist-link" href="#" target="_blank">&nbsp;</a></h2>
        <h3 id="album"><a id="album-link" href="#" target="_blank">&nbsp;</a></h3>
        <h4 id="year">&nbsp;</h4>
      </div>

      <div id="url-play-btn-wrapper" style="display: none;">
        <button id="main-action-btn" class="url-play-btn-physical">
          <span><i class="fa-solid fa-play"></i> 播放</span>
        </button>
        <input type="file" id="local-upload-input" accept="audio/*" style="display: none;">
      </div>

      <div id="bottom-section"
        style="display: grid; grid-template-rows: 0fr; opacity: 0; pointer-events: none; transition: grid-template-rows 1.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.5s ease; width: 100%;">
        <div style="overflow: hidden; min-height: 0;">
          <div class="progress-area" id="progress-area">
            <div class="progress-bar-bg" id="progress-container">
              <div class="progress-fill" id="progress"></div>
            </div>
            <div class="time-labels">
              <span id="current-time">0:00</span>
              <span id="duration">-:-</span>
            </div>
          </div>

          <div class="controls" id="controls" style="opacity: 0; transition: opacity 0.5s ease;">
            <i class="fa-solid fa-play btn-play" id="play" title="Play"></i>
          </div>
        </div>
      </div>

      <audio id="audio" crossorigin="anonymous" src=""></audio>
    </div>
  </div>

  <div id="toast">已複製音樂連結！</div>

  <!-- CDN scripts are now lazy-loaded dynamically via script.js ONLY when needed -->
  <script src="./script.js?v=71"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((registration) => {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }).catch((err) => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>

</html>
